    <style>
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: #04060d;
        }
        .team-box {
            max-width: 1100px;
            margin: 8rem auto 4rem auto;
            padding: 0 2rem;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .card {
            background: rgba(10, 15, 30, 0.75) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5) !important;
            backdrop-filter: blur(12px);
            border-radius: 24px !important;
            padding: 2.5rem 2rem !important;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }
        .card:hover {
            border-color: rgba(0, 180, 216, 0.5) !important;
            transform: translateY(-6px);
        }
        .img-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem auto;
        }
        .team-photo {
            border-radius: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 3px solid rgba(0, 180, 216, 0.15);
            transition: border-color 0.3s;
        }
        /* Custom dynamic HUD target canvas over images */
        .hud-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover .hud-canvas {
            opacity: 1;
        }
        .card:hover .team-photo {
            border-color: #00b4d8;
        }
    </style>
</head>

                <p style="color: #00b4d8; font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem; letter-spacing: 1px;">STUDENT CHAIR</p>
                <div class="social-links" style="display: flex; gap: 1.25rem; justify-content: center; font-size: 1.2rem;">

                    <a href="https://www.instagram.com/akhil_01_aj?igsh=dHk3OTJ6dXlsbTBw" target="_blank" style="color: #64748b; transition: color 0.2s;"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.linkedin.com/in/j-akhil-aj?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank" style="color: #64748b; transition: color 0.2s;"><i class="fa-brands fa-linkedin-in"></i></a>

                <p style="color: #00b4d8; font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem; letter-spacing: 1px;">VICE STUDENT CHAIR</p>

                    <a href="mailto:modhakkushalappa@gmail.com" target="_blank" style="color: #64748b; transition: color 0.2s;"><i class="fa-solid fa-envelope"></i></a>

        </div>

    <script>
        // Back-grid Canvas setup
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        function resize() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function drawBackgroundGrid() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.strokeStyle = "rgba(0, 180, 216, 0.02)";
            bgCtx.lineWidth = 1;
            for(let x=0; x < bgCanvas.width; x += 50) {
                bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x, bgCanvas.height); bgCtx.stroke();
            }
            for(let y=0; y < bgCanvas.height; y += 50) {
                bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(bgCanvas.width, y); bgCtx.stroke();
            }
        }

        // Loop over HUD canvases on team photos to render targeting circles
        const canvases = document.querySelectorAll('.hud-canvas');
        let angle = 0;

        function animateHUDs() {
            angle += 0.025;
            drawBackgroundGrid();

            canvases.forEach(canvas => {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,140,140);
                
                const c = 70; // Center coordinate
                
                // Draw target tracking rotating brackets
                ctx.strokeStyle = '#00b4d8';
                ctx.lineWidth = 2;
                ctx.beginPath();
                // Arc segment 1
                ctx.arc(c, c, 62, angle, angle + Math.PI*0.4);
                ctx.stroke();

                ctx.beginPath();
                // Arc segment 2
                ctx.arc(c, c, 62, angle + Math.PI, angle + Math.PI*1.4);
                ctx.stroke();

                // Telemetry targeting scope lines
                ctx.strokeStyle = 'rgba(0, 180, 216, 0.35)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(c - 10, c); ctx.lineTo(c + 10, c);
                ctx.moveTo(c, c - 10); ctx.lineTo(c, c + 10);
                ctx.stroke();
            });

            requestAnimationFrame(animateHUDs);
        }
        animateHUDs();
    </script>
</body>
</html>
