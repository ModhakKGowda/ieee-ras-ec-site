<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Committee - IEEE RAS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-wrapper">
            <div class="logo-container">
                <img src="https://cdn.brandfetch.io/idyeOpla1i/w/128/h/47/theme/dark/logo.png?c=1bxid64Mup7aczewSAYMX&t=1781723057959" alt="IEEE RAS" class="logo-img-ras">
                <div class="logo-divider"></div>
                <img src="https://cdn.brandfetch.io/idmoEW6P4D/w/155/h/72/theme/dark/logo.png?c=1bxid64Mup7aczewSAYMX&t=1718704217023" alt="PES University" class="logo-img-pes">
            </div>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/team" class="btn-nav">Team</a>
        </nav>
    </header>

    <section class="section">
        <h2 class="section-title">Our Core Team</h2>
        <p class="section-desc">Meet the minds leading the IEEE RAS EC Chapter initiatives.</p>
        
        <div class="team-grid">
            <div class="card">
                <div class="image-container">
                    <img src="{{ url_for('static', filename='images/ieee-ras-ec-chair.png') }}" alt="EC Chair" class="team-photo">
                </div>
                <h3 class="card-title">Student Chair</h3>
                <p class="role">J Akhil</p>
                <div class="social-links">
                    <a href="mailto:akhil01aj@gmail.com" title="Email" target="_blank"><i class="fa-solid fa-envelope"></i></a>
                    <a href="https://www.instagram.com/akhil_01_aj?igsh=dHk3OTJ6dXlsbTBw" title="Instagram" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                    <a href="https://www.linkedin.com/in/j-akhil-aj?utm_source=share_via&utm_content=profile&utm_medium=member_android" title="LinkedIn" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="{{ url_for('static', filename='images/ieee-ras-ec-vicechair.png') }}" alt="EC Vice Chair" class="team-photo">
                </div>
                <h3 class="card-title">Student Vice Chair</h3>
                <p class="role">Modhak Kushalappa</p>
                <div class="social-links empty-placeholder">
                     <span class="placeholder-spacer"></span>
                </div>
            </div>
        </div>

        <h2 class="sub-team-heading">Other Committee Members</h2>
        <div class="team-grid">
            <div class="card">
                <div class="image-container">
                    <div class="avatar-placeholder"><i class="fa-solid fa-robot"></i></div>
                </div>
                <h3 class="card-title">Core Member</h3>
                <p class="role">Team Member Name</p>
            </div>
        </div>
    </section>

</body>
</html>
