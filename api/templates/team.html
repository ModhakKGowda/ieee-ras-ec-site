    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        let targets = [];
        for(let i=0; i<15; i++) {
            targets.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 10 + Math.random()*20, alpha: 0.1 + Math.random()*0.3, dAlpha: 0.005 });
        }

        function drawTarget(x, y, size, alpha) {
            ctx.strokeStyle = `rgba(0, 180, 216, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.strokeRect(x - size/2, y - size/2, size, size);
            ctx.beginPath();
            ctx.moveTo(x - size, y); ctx.lineTo(x + size, y);
            ctx.moveTo(x, y - size); ctx.lineTo(x, y + size);
            ctx.stroke();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            targets.forEach(t => {
                t.alpha += t.dAlpha;
                if(t.alpha <= 0.05 || t.alpha >= 0.4) t.dAlpha *= -1;
                drawTarget(t.x, t.y, t.size, t.alpha);
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
