<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robo-Sandbox | IEEE RAS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Shared Global Identity Design variables mirroring home/about pages */
        :root[data-theme="dark"] {
            --bg-base: #03050d;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --card-bg: rgba(10, 16, 36, 0.75);
            --card-border: rgba(0, 245, 255, 0.15);
            --accent-glow: #00f5ff;
            --sandbox-panel: #060b1e;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: radial-gradient(circle at 50% -20%, rgba(0, 245, 255, 0.08), transparent 80%);
        }

        .sandbox-wrapper {
            max-width: 1000px;
            margin: 7rem auto 4rem auto;
            padding: 0 2rem;
        }

        /* Glassmorphism panel container styling */
        .arcade-cabinet {
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            margin-top: 2rem;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .score-board {
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent-glow);
            background: rgba(0, 245, 255, 0.1);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.15);
        }

        #gameCanvas {
            background: rgba(5, 8, 22, 0.9);
            border-radius: 16px;
            width: 100%;
            display: block;
            border: 2px solid var(--card-border);
            cursor: pointer;
        }

        .legend-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.2rem;
            margin-top: 1.5rem;
            backdrop-filter: blur(12px);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .legend-card { grid-template-columns: repeat(2, 1fr); }
        }

        .legend-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.02);
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            margin-bottom: 0.4rem;
        }
    </style>
</head>

            </div>
        </div>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/events">Events</a>
            <a href="/team">Team</a>
            <a href="/sandbox" class="active">Sandbox</a>
        </nav>
    </header>

            <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 1.05rem;">Guide the mechanical android safely through the path while avoiding incoming electrical components.</p>
        </div>

        <div class="arcade-cabinet">
            <div class="game-header">

                <div class="score-board">Score: <span id="currentScore">0000</span></div>
