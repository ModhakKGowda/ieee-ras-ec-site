<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | IEEE RAS EC Campus</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* Shared Theme Matrix Variables */
        :root[data-theme="dark"] {
            --bg-gradient: radial-gradient(circle at center, #050814 0%, #010205 100%);
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
            --text-hero: linear-gradient(to right, #ffffff, #94a3b8);
            --card-bg: rgba(8, 14, 28, 0.7);
            --card-border: rgba(0, 180, 216, 0.15);
            --card-shadow: rgba(0,0,0,0.5);
            --bot-glow: #00f5ff;
            --grid-line: rgba(0, 245, 255, 0.02);
            --btn-bg: #00f5ff;
            --btn-text: #020306;
        }
        :root[data-theme="light"] {
            --bg-gradient: radial-gradient(circle at center, #f4f7fa 0%, #e2e8f0 100%);
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-hero: linear-gradient(to right, #0f172a, #334155);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 180, 216, 0.25);
            --card-shadow: rgba(148, 163, 184, 0.2);
            --bot-glow: #00b4d8;
            --grid-line: rgba(0, 180, 216, 0.05);
            --btn-bg: #00b4d8;
            --btn-text: #ffffff;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: var(--bg-gradient);
            transition: background 0.4s ease;
        }
        .hero-section {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 2rem;
            position: relative;
            z-index: 2;
        }
        .cta-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 30px var(--card-shadow);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px var(--bot-glow);
        }
        .theme-toggle-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--bot-glow);
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            box-shadow: 0 10px 25px var(--card-shadow);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body style="color: var(--text-main); overflow: hidden; transition: color 0.4s ease;">

    <canvas id="bg-canvas"></canvas>

    <button class="theme-toggle-btn" id="themeBtn" onclick="toggleTheme()">
        <i class="fa-solid fa-moon"></i>
    </button>

    <header class="navbar">
        <div class="logo-wrapper">
            <div class="logo-container">
                <img src="https://cdn.brandfetch.io/idyeOpla1i/w/128/h/47/theme/dark/logo.png?c=1bxid64Mup7aczewSAYMX&t=1781723057959" class="logo-img-ras">
                <div class="logo-divider"></div>
                <img src="https://cdn.brandfetch.io/idmoEW6P4D/w/155/h/72/theme/dark/logo.png?c=1bxid64Mup7aczewSAYMX&t=1718704217023" class="logo-img-pes">
            </div>
        </div>
        <nav>
            <a href="/" class="active">Home</a>
            <a href="/about">About</a>
            <a href="/events">Events</a>
            <a href="/team">Team</a>
        </nav>
    </header>

    <section class="hero-section">
        <h1 style="font-size: 4.5rem; font-weight: 800; line-height: 1.1; background: var(--text-hero); -webkit-background-clip: text; -webkit-text-fill-color: transparent; max-width: 900px; margin-bottom: 1.5rem;">
            IEEE Robotics & Automation Society
        </h1>
        <p style="color: var(--text-muted); font-size: 1.3rem; max-width: 650px; line-height: 1.6; margin-bottom: 3rem;">
            Welcome to the PESU EC Campus chapter. We unite mechanical designers, firmware developers, and automation engineers.
        </p>
        <a href="/events" class="cta-btn">Explore Challenges</a>
    </section>

    <script>
        function toggleTheme() {
            const root = document.documentElement;
            const currentTheme = root.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', newTheme);
            localStorage.setItem('ras-theme', newTheme);
            document.getElementById('themeBtn').innerHTML = newTheme === 'dark' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
        }

        const savedTheme = localStorage.getItem('ras-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('themeBtn').innerHTML = savedTheme === 'dark' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';

        // Animated tech particle environment
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        for(let i=0; i<60; i++) {
            points.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.8, vy: (Math.random()-0.5)*0.8 });
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const styles = getComputedStyle(document.documentElement);
            let glowColor = styles.getPropertyValue('--bot-glow').trim();
            let gridColor = styles.getPropertyValue('--grid-line').trim();

            ctx.strokeStyle = gridColor;
            for(let i=0; i<canvas.width; i+=60) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            }

            points.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0 || p.x>canvas.width) p.vx *= -1;
                if(p.y<0 || p.y>canvas.height) p.vy *= -1;

                ctx.fillStyle = glowColor;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
