<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bipedal Skeleton Kinematics Lab | IEEE RAS EC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080B11; color: #FFFFFF; }
        canvas { background: #0F172A; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6">

    <header class="w-full max-w-5xl mx-auto flex items-center justify-between mb-6">
        <a href="/" class="text-sm font-semibold text-blue-400 hover:underline">&larr; Return to Main Site</a>
        <h1 class="text-xl font-bold text-yellow-500">🤖 Bipedal Mechatronic Skeleton Simulator</h1>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center">
        <canvas id="simCanvas" width="800" height="450" class="rounded-2xl shadow-2xl mb-4"></canvas>
        <div class="flex items-center gap-6 text-xs text-gray-400">
            <div>Drive Controls: <span class="text-yellow-400 font-mono font-bold">A / D or Left/Right Arrow</span></div>
            <div>Joint Actuation: <span class="text-blue-400 font-mono font-bold">W / S</span></div>
        </div>
    </main>

    <footer class="text-center text-xs text-gray-600">
        IEEE RAS PES University EC Campus — Robotics Sandbox
    </footer>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        let botX = 400;
        let walkCycle = 0;
        let keys = {};

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function drawSkeleton() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Floor
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 380);
            ctx.lineTo(800, 380);
            ctx.stroke();

            // Movement logic
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) { botX -= 2; walkCycle += 0.1; }
            if (keys['d'] || keys['D'] || keys['ArrowRight']) { botX += 2; walkCycle += 0.1; }

            const hipY = 260 + Math.sin(walkCycle * 2) * 3;
            const leftLegAngle = Math.sin(walkCycle) * 0.5;
            const rightLegAngle = -Math.sin(walkCycle) * 0.5;

            ctx.strokeStyle = '#3B82F6';
            ctx.lineWidth = 4;

            // Torso
            ctx.beginPath();
            ctx.moveTo(botX, hipY);
            ctx.lineTo(botX, hipY - 70);
            ctx.stroke();

            // Head / Sensor Node
            ctx.fillStyle = '#F59E0B';
            ctx.beginPath();
            ctx.arc(botX, hipY - 85, 12, 0, Math.PI * 2);
            ctx.fill();

            // Left Leg Kinematics
            let lKneeX = botX + Math.sin(leftLegAngle) * 40;
            let lKneeY = hipY + Math.cos(leftLegAngle) * 40;
            ctx.beginPath();
            ctx.moveTo(botX, hipY);
            ctx.lineTo(lKneeX, lKneeY);
            ctx.lineTo(lKneeX + Math.sin(leftLegAngle + 0.3) * 40, 380);
            ctx.stroke();

            // Right Leg Kinematics
            let rKneeX = botX + Math.sin(rightLegAngle) * 40;
            let rKneeY = hipY + Math.cos(rightLegAngle) * 40;
            ctx.strokeStyle = '#60A5FA';
            ctx.beginPath();
            ctx.moveTo(botX, hipY);
            ctx.lineTo(rKneeX, rKneeY);
            ctx.lineTo(rKneeX + Math.sin(rightLegAngle + 0.3) * 40, 380);
            ctx.stroke();
        }

        function loop() {
            drawSkeleton();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
