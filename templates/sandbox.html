<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robo Dino Runner | IEEE RAS EC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080B11; color: #FFFFFF; font-family: ui-sans-serif, system-ui, sans-serif; }
        canvas { background-color: #0F172A; border: 2px solid #374151; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-6">

    <header class="w-full max-w-4xl mx-auto flex items-center justify-between mb-4">
        <a href="/" class="text-sm font-semibold text-blue-400 hover:underline">&larr; Back to Home</a>
        <h1 class="text-xl font-bold text-yellow-500">🦖 Robo-Dino Chrome Runner</h1>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center">
        <canvas id="gameCanvas" width="800" height="300" class="rounded-xl shadow-2xl"></canvas>
        <p class="text-xs text-gray-400 mt-4">Press <span class="text-yellow-400 font-mono font-bold">SPACE</span> or <span class="text-yellow-400 font-mono font-bold">UP ARROW</span> to jump over incoming obstacles!</p>
    </main>

    <footer class="text-center text-xs text-gray-600">
        IEEE RAS PES University EC Campus
    </footer>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let dino = { x: 80, y: 220, width: 30, height: 40, vy: 0, gravity: 0.6, isJumping: false };
        let obstacles = [];
        let frame = 0;
        let score = 0;
        let gameOver = false;

        function jump() {
            if (!dino.isJumping) {
                dino.vy = -12;
                dino.isJumping = true;
            } else if (gameOver) {
                resetGame();
            }
        }

        window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') jump(); });
        canvas.addEventListener('touchstart', jump);

        function resetGame() {
            obstacles = [];
            score = 0;
            gameOver = false;
            dino.y = 220;
            dino.vy = 0;
            dino.isJumping = false;
            loop();
        }

        function update() {
            if (gameOver) return;

            dino.y += dino.vy;
            dino.vy += dino.gravity;

            if (dino.y >= 220) {
                dino.y = 220;
                dino.vy = 0;
                dino.isJumping = false;
            }

            frame++;
            if (frame % 90 === 0) {
                obstacles.push({ x: 800, width: 20 + Math.random() * 15, height: 35 + Math.random() * 20 });
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 6;

                // Collision Detection
                if (
                    dino.x < obstacles[i].x + obstacles[i].width &&
                    dino.x + dino.width > obstacles[i].x &&
                    dino.y < 260 &&
                    dino.y + dino.height > 260 - obstacles[i].height
                ) {
                    gameOver = true;
                }

                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground Line
            ctx.strokeStyle = '#4B5563';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 260); ctx.lineTo(800, 260); ctx.stroke();

            // Draw Robot Dino
            ctx.fillStyle = '#3B82F6';
            ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
            ctx.fillStyle = '#F59E0B'; // Eye
            ctx.fillRect(dino.x + 20, dino.y + 5, 6, 6);

            // Draw Obstacles (Hardware Components)
            ctx.fillStyle = '#EF4444';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, 260 - obs.height, obs.width, obs.height);
            });

            // Score
            ctx.font = '16px monospace';
            ctx.fillStyle = '#FFFFFF';
            ctx.fillText(`SCORE: ${score}`, 670, 40);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#EF4444';
                ctx.font = '24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 10);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = '14px sans-serif';
                ctx.fillText('Press SPACE to Restart', canvas.width / 2, canvas.height / 2 + 20);
                ctx.textAlign = 'left';
            }
        }

        function loop() {
            update();
            draw();
            if (!gameOver) requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
