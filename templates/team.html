<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #04050d; }
        .team-box { max-width: 1100px; margin: 8rem auto 4rem auto; padding: 0 2rem; text-align: center; position: relative; z-index: 2; }
        .card { background: rgba(10, 15, 30, 0.8) !important; border: 1px solid rgba(0, 245, 255, 0.12) !important; backdrop-filter: blur(12px); border-radius: 24px !important; padding: 2.5rem 2rem !important; transition: all 0.4s ease; }
        .card:hover { border-color: #00f5ff !important; transform: translateY(-6px); box-shadow: 0 20px 45px rgba(0, 245, 255, 0.15) !important; }
        .img-wrapper { position: relative; width: 140px; height: 140px; margin: 0 auto 1.5rem auto; }
        .team-photo { border-radius: 50%; width: 100%; height: 100%; object-fit: cover; border: 3px solid rgba(0, 245, 255, 0.15); }
    </style>
